# okf-ingest sources. Sync is source-authoritative: whatever these sources
# publish is mirrored into the knowledge tree under $OKF_KNOWLEDGE_ROOT —
# add / replace / remove, one commit per run, consistency keyed on content
# hashes. The operator repo's fixture bundles are read-only demo content;
# sync refuses to run without a knowledge root.
ledger: ingest/ledger.yaml
quarantine: ingest/quarantine
sources:
  - name: self-docs
    type: git
    url: .
    paths: ["docs/*.md"]
    target: acme-knowledge/imported
