# okf-ingest sources. Sync is source-authoritative: whatever these sources
# publish is mirrored into the knowledge tree under $OKF_KNOWLEDGE_ROOT —
# add / replace / remove, one commit per run, consistency keyed on content
# hashes. The operator repo's fixture bundles are read-only demo content;
# sync refuses to run without a knowledge root.
ledger: ingest/ledger.yaml
quarantine: ingest/quarantine
# Optional: embed synced concepts into a persistent vector store for
# semantic search (requires `uv sync --extra semantic`). Path is relative to
# the knowledge root. Absent this key entirely -> no embedding, no-op.
# embeddings:
#   model: sentence-transformers/all-MiniLM-L6-v2
#   path: ingest/embeddings.db
# Optional: cadence for the `watch` background worker (issue #48).
# `Nm|Nh|Nd` (minutes/hours/days) — cron syntax is out of scope, see
# okf_mcp.ingest.scheduler for why. A per-source `schedule:` (below)
# overrides this; a source with neither uses `watch`'s own `--interval`
# as its cadence. Absent this key entirely -> only the per-source
# override (or `--interval`) governs when a source is due.
# schedule: 1h
sources:
  - name: self-docs
    type: git
    url: .
    paths: ["docs/*.md"]
    target: acme-knowledge/imported
    # schedule: 15m   # per-source override of the global `schedule:` above

# --- issue #49: importing precomputed vectors -----------------------------
# A source opts a connector into pairing `<path>.okf-vec.json` sidecars
# alongside its documents by setting `vectors: sidecar`. Sidecars carry
# `{"model_id": ..., "dim": ..., "vector": [...]}`; a vector whose model_id
# matches the `embeddings:` block above is imported straight into the store
# (zero local encode calls) — a mismatch or malformed sidecar is quarantined
# under `ingest/quarantine/vectors/` and the document falls back to local
# encoding. See docs/usage.md#importing-precomputed-vectors.
